name: fg2000

on:
  workflow_dispatch:
  workflow_call:
  # schedule:
  #   - cron: 0 20 * * *

env:
  #REPO_URL: https://github.com/teemopango/openwrt-6.x.git
  #REPO_BRANCH: k6.12-nss-inseego-fg2000
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  #REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  #REPO_BRANCH: main-nss
  REPO_BRANCH: 25.12-nss  
  CONFIG_FILE: configs/fg2000.config
  GENERAL_CONFIG_FILE: configs/General.config
  DIY_SCRIPT: scripts/Roc-script.sh
  CLASH_KERNEL: amd64
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: fg2000
  TZ: Asia/Shanghai
  CUSTOM_DTS: dts/ipq8072-fg2000.dts  # 不要加路径前缀
jobs:
  Build:
    runs-on: ubuntu-24.04

    steps:
    - name: Check Server Performance(检查服务器性能)
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Initialization Environment(初始化环境)
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -y update
        sudo -E apt-get -y install $(curl -fsSL ophub.org/ubuntu2404-make-openwrt-depends)
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    - name: Checkout(检出代码)
      uses: actions/checkout@main

    - name: Clone Source Code(克隆源代码)
      run: |
        df -hT $GITHUB_WORKSPACE
        sudo mkdir -p /mnt/openwrt
        sudo chown -R $(id -u):$(id -g) /mnt/openwrt
        git clone --depth 1 -b $REPO_BRANCH --single-branch $REPO_URL /mnt/openwrt
        cd /mnt/openwrt
        echo "OPENWRT_PATH=$PWD" >> $GITHUB_ENV
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV
        VERSION_KERNEL=$(grep -oP 'LINUX_KERNEL_HASH-\K[0-9]+\.[0-9]+\.[0-9]+' target/linux/generic/kernel-6.12)
        echo "VERSION_KERNEL=$VERSION_KERNEL" >> $GITHUB_ENV
        
    - name: Debug - List repository structure(调试-列出仓库结构)
      run: |
        echo "Current workspace: $GITHUB_WORKSPACE"
        echo "=== Repository root ==="
        ls -la $GITHUB_WORKSPACE/
        echo "=== Looking for DTS files ==="
        find $GITHUB_WORKSPACE -name "*.dts" -o -name "*.dtsi" 2>/dev/null
        echo "=== Directory tree (2 levels) ==="
        find $GITHUB_WORKSPACE -maxdepth 2 -type d 2>/dev/null

    - name: Generate Variables(生成变量)
      run: |
        cp $CONFIG_FILE $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig > /dev/null 2>&1
        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        echo "HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV
        echo "CACHE_DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV

    - name: Cache Toolchain(缓存工具链)
      uses: actions/cache@main
      with:
        key: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.HASH }} ${{ env.CACHE_DATE }}
        restore-keys: ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-
        path: |
          ${{ env.OPENWRT_PATH }}/.ccache
          ${{ env.OPENWRT_PATH }}/staging_dir

    - name: Refresh The Cache(刷新缓存)
      run: |
        if [ -d "$OPENWRT_PATH/staging_dir" ]; then
          find "$OPENWRT_PATH/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
              find "$dir" -type f -exec touch {} +
          done
        fi

    - name: Install Feeds(安装feeds)
      run: |
        cd $OPENWRT_PATH
        ./scripts/feeds update -a
        ./scripts/feeds install -a
  
    - name: Load Custom Configuration(加载自定义配置)
      run: |
        chmod +x $DIY_SCRIPT
        cd $OPENWRT_PATH         
        $GITHUB_WORKSPACE/$DIY_SCRIPT        

    - name: Download DL Package(下载DL软件包)
      run: |
        cat $CONFIG_FILE $GENERAL_CONFIG_FILE > $OPENWRT_PATH/.config
        cd $OPENWRT_PATH
        make defconfig
        make download -j$(nproc)

        
    # 在 Download DL Package 之后，添加验证步骤
    - name: Verify Device Configuration(验证设备配置)
      run: |
        cd $OPENWRT_PATH
        echo "=== Target device info ==="
        grep "CONFIG_TARGET.*fg2000" .config || echo "WARNING: FG2000 not found in config"
        echo "=== Available profiles ==="
        make info -j1 | grep -A5 "Profiles:" | head -20
    # ============ 新增：应用自定义 DTS ============
    - name: Apply Custom DTS(应用自定义DTS)
      run: |
        echo "Applying custom DTS for FG2000..."
        
        # 检查自定义 DTS 文件是否存在
        if [ ! -f "$GITHUB_WORKSPACE/$CUSTOM_DTS" ]; then
            echo "ERROR: Custom DTS file not found: $GITHUB_WORKSPACE/$CUSTOM_DTS"
            exit 1
        fi
        
        # 查找 OpenWrt 中现有的 FG2000 DTS 文件
        cd $OPENWRT_PATH
        DTS_SEARCH=$(find target/linux -name "*inseego*" -o -name "*fg2000*" -o -name "*FG2000*" 2>/dev/null)
        echo "Found existing DTS files:"
        echo "$DTS_SEARCH"
        
        if [ -n "$DTS_SEARCH" ]; then
            # 如果有现有的 DTS，备份并替换
            for dts_file in $DTS_SEARCH; do
                echo "Backing up: $dts_file"
                cp "$dts_file" "${dts_file}.orig"
                echo "Replacing: $dts_file"
                cp "$GITHUB_WORKSPACE/$CUSTOM_DTS" "$dts_file"
            done
        else
            # 如果没有现有的 DTS，放到标准位置
            DTS_TARGET="target/linux/${DEVICE_TARGET}/dts/qcom-ipq8074-inseego-fg2000.dts"
            echo "No existing DTS found, copying to: $DTS_TARGET"
            mkdir -p "$(dirname $DTS_TARGET)"
            cp "$GITHUB_WORKSPACE/$CUSTOM_DTS" "$DTS_TARGET"
        fi
        
        echo "Custom DTS applied successfully!"

    # ============ 新增：应用补丁文件 ============
    - name: Apply Patches(应用补丁文件)
      run: |
        echo "Applying custom patches..."
        
        # 检查补丁目录是否存在
        if [ ! -d "$GITHUB_WORKSPACE/$CUSTOM_PATCHES_DIR" ]; then
            echo "No patches directory found, skipping..."
            exit 0
        fi
        
        cd $OPENWRT_PATH
        
        # 确定目标补丁目录
        KERNEL_VERSION=$(ls target/linux/${DEVICE_TARGET}/ | grep -oP 'patches-\K[0-9]+\.[0-9]+' | head -1)
        if [ -z "$KERNEL_VERSION" ]; then
            KERNEL_VERSION="6.12"  # 默认版本
        fi
        PATCH_TARGET="target/linux/${DEVICE_TARGET}/patches-${KERNEL_VERSION}"
        
        echo "Kernel version: $KERNEL_VERSION"
        echo "Patch target directory: $PATCH_TARGET"
        
        # 创建目标目录（如果不存在）
        mkdir -p "$PATCH_TARGET"
        
        # 复制所有补丁文件
        PATCH_COUNT=0
        for patch in "$GITHUB_WORKSPACE/$CUSTOM_PATCHES_DIR"/*.patch; do
            if [ -f "$patch" ]; then
                PATCH_NAME=$(basename "$patch")
                echo "Copying patch: $PATCH_NAME"
                cp "$patch" "$PATCH_TARGET/$PATCH_NAME"
                PATCH_COUNT=$((PATCH_COUNT + 1))
            fi
        done
        
        echo "Applied $PATCH_COUNT patches successfully!"
        
        # 验证补丁格式
        for patch in "$PATCH_TARGET"/*.patch; do
            if [ -f "$patch" ]; then
                echo "Verifying patch: $(basename $patch)"
                if ! grep -q "^--- a/" "$patch" && ! grep -q "^--- a/" "$patch"; then
                    echo "WARNING: Patch $(basename $patch) may not be in correct format"
                fi
            fi
        done
    

    - name: Compile Firmware(开始编译固件)
      id: compile
      run: |
        cd $OPENWRT_PATH
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT
        echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%Y.%m.%d")" >> $GITHUB_ENV

    - name: Check Space Usage(检查空间使用情况)
      if: (!cancelled())
      run: df -hT

    - name: Upload Bin Directory(上传固件)
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE_REPO }}-bin-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.FILE_DATE }}
        path: ${{ env.OPENWRT_PATH }}/bin

    - name: Organize Files(整理文件)
      if: steps.compile.outputs.status == 'success'
      run: |
        cd $OPENWRT_PATH/bin/targets/*/*
        cp $OPENWRT_PATH/.config .config
        mv config.buildinfo .config.buildinfo
        mv -f $OPENWRT_PATH/bin/packages/*/*/*.apk packages
        tar -zcf .Packages.tar.gz packages
        rm -rf packages feeds.buildinfo version.buildinfo sha256sums profiles.json
        echo "FIRMWARE_PATH=$PWD" >> $GITHUB_ENV

    - name: Upload Firmware To Artifact(将固件上传到Artifact)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE_REPO }}-firmware-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: Upload Firmware To Release(发布固件)
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@main
      with:
        name: ${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### 📒 固件信息
          - 这是开启全功能NSS的6.12内核固件，默认主题为Aurora；该固件在ImmortalWrt的基础上，添加了额外的软件包cpufreq、ddns、ttyd、upnp、wolplus、samba4、vlmcsd、aria2、autoreboot、uhttpd、wifischedule、frps、frpc、diskman、hd-idle、banip、acme、arpbind、usb-printer、passwall、oaf、sqm、wireguard、watchcat、wechatpush、3cat、smartdns，并添加了若干工具，具体详见.config和General.config。
          - 💻 这是 ${{ env.FIRMWARE_TAG }} 平台使用的 OpenWrt 固件
          - ⚽ 固件源码: ${{ env.REPO_URL }}
          - 💝 源码分支: ${{ env.REPO_BRANCH }}
          - 🌐 默认地址: **192.168.2.1**
          - 🔑 默认密码: none
          ### 🧊 固件版本
          - 固件内核版本：**${{ env.VERSION_KERNEL }}**
          - 固件编译前最后一次➦[主源码](${{ env.REPO_URL }})更新记录
          - ${{ env.VERSION_INFO }}

    - name: Delete Old Cache(删除旧缓存)
      run: |
        # 获取缓存列表并删除
        gh cache list --key ${{ env.SOURCE_REPO }}-${{ env.REPO_BRANCH }}-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}- --json key --jq '.[] | .key' | while read -r key; do
          gh cache delete "$key"
        done
        # 输出缓存状态
        echo "========cache status========"
        echo "ccache: $(du -sh $OPENWRT_PATH/.ccache | cut -f 1)"
        echo "staging: $(du -sh $OPENWRT_PATH/staging_dir | cut -f 1)"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
